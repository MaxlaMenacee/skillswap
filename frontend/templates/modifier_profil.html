{% extends "base.html" %}
{% block title %}Modifier mon profil — SkillSwap{% endblock %}

{% block content %}
<h1>Modifier mon profil</h1>
<form method="POST" style="max-width:480px;">
    <div class="form-row">
        <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" name="prenom" value="{{ user.prenom }}" required>
        </div>
        <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" name="nom" value="{{ user.nom }}" required>
        </div>
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ user.email }}" required>
    </div>
    <div>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Annuler</a>
    </div>
</form>
{% endblock %}
