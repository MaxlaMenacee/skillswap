{% extends "base.html" %}
{% block title %}Connexion — SkillSwap{% endblock %}

{% block content %}
<h1>Se connecter</h1>
<form method="POST" action="{{ url_for('login') }}" style="max-width:400px;">
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ email|default('') }}" required autocomplete="email">
    </div>
    <div class="form-group">
        <label for="mot_de_passe">Mot de passe</label>
        <input type="password" id="mot_de_passe" name="mot_de_passe" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary">Se connecter</button>
    <p class="mt-1 text-muted" style="font-size:.9rem;">Pas encore de compte ? <a href="{{ url_for('inscription') }}">Créer un compte</a></p>
</form>
{% endblock %}
